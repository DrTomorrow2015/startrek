<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Star Trek – The Q Trial</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      color: white;
      background: #000;
    }

    .scene-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .frame {
      position: relative;
      width: 100%; height: 100%;
      max-width: 100vw;
      max-height: calc(100vw * 450 / 900);
      overflow: hidden;
      background: #000;
    }

    @media (min-aspect-ratio: 900/450) {
      .frame {
        max-width: calc(100vh * 900 / 450);
        max-height: 100vh;
      }
    }

    .frame img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .background { z-index: 1; }

    .character {
      bottom: 200px;
      z-index: 2;
      object-fit: contain;
      transition: opacity 0.3s;
    }

    /* ---------- DIALOG MODE ---------- */
    #dialog-and-button-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: flex-end;
      max-width: 1800px;
      width: 95%;
      z-index: 10;
    }

    #logbox {
      position: static;
      width: auto;
      padding: 15px 10px;
      border-radius: 15px;
      background: rgba(0,0,0,0.6);
      color: white;
      backdrop-filter: blur(10px);
      border: 2px solid #666;
      box-sizing: border-box;
      z-index: 10;
      flex-grow: 1;
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dialog-text {
      max-width: 100%;
      margin: 0 auto;
      font-size: clamp(14px, 2vw, 18px);
      line-height: 1.4em;
      text-align: center;
      white-space: pre-wrap;
      padding: 10px 0;
    }

    .buttons-container {
      margin-left: 10px;
      flex-shrink: 0;
    }

    .image-btn {
      cursor: pointer;
      width: clamp(50px, 7vw, 70px);
      height: clamp(64px, 9vw, 90px);
      border: none;
      background: transparent;
      padding: 0;
      transform: translateY(-5px);
    }

    .image-btn:hover { opacity: 0.8; }

    /* ---------- CHOICE MODE ---------- */
    #choice-container {
      position: fixed;
      bottom: 33px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 1600px;
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    .choice-box {
      flex: 1;
      background: rgba(0,0,0,0.6);
      border: 2px solid #666;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: 0.2s;
    }

    .choice-box:hover {
      background: rgba(70,70,70,0.6);
      transform: scale(1.03);
    }

    .choice-text {
      font-size: clamp(14px, 2vw, 18px);
      line-height: 1.4em;
      white-space: pre-wrap;
    }

    /* ---------- THE END SCREEN ---------- */
    #end-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #end-screen h1 {
      font-size: clamp(32px, 6vw, 64px);
      letter-spacing: 0.15em;
      color: #c9a227;
      margin-bottom: 20px;
    }

    #end-screen p {
      font-size: clamp(14px, 2vw, 20px);
      color: #aaa;
      letter-spacing: 0.05em;
    }

    #restart-btn {
      margin-top: 40px;
      padding: 12px 36px;
      font-size: 16px;
      background: transparent;
      border: 2px solid #666;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: 0.2s;
    }

    #restart-btn:hover {
      background: rgba(255,255,255,0.1);
    }

    /* ---------- MOBILE ---------- */
    @media (max-width: 768px) {
      #dialog-and-button-container {
        width: 98%;
        align-items: center;
      }
      #logbox {
        padding: 15px 10px;
        min-height: 70px;
      }
      .buttons-container { margin-left: 5px; }
      .image-btn { transform: translateY(0); }
    }
  </style>
</head>

<!-- SCENE -->

  <div class="frame" id="sceneFrame">

  <div class="buttons-container">

<!-- CHOICE UI -->
<div id="choice-container" style="display:none;"></div>

<!-- THE END -->
<div id="end-screen">
  <h1>THE END</h1>
  <p>Stardate 4978.4</p>
  <button id="restart-btn" onclick="startGame()">Play Again</button>

  const endScreen    = document.getElementById('end-screen');

  let currentScene = null;
  let currentLineIndex = 0;
  let currentBg   = "";
  let currentChar = "";

  document.querySelectorAll('.frame img').forEach(img =>
    img.addEventListener('dragstart', e => e.preventDefault())
  );

  function setBackground(src) {
    if (src && src !== currentBg) {
      bgImg.src = src;
      currentBg = src;
    }
  }

  function setCharacter(src) {
    if (src === undefined) return; // keep whatever is showing
    if (src === currentChar) return;
    charImg.style.opacity = '0';
    setTimeout(() => {
      charImg.src = src || '';
      currentChar = src;
      if (src) {
        setTimeout(() => { charImg.style.opacity = '1'; }, 150);
      }
    }, 300);
  }

  function goToScene(id) {
    const scene = SCENES[id];
    if (!scene) { console.warn("Missing scene:", id); return; }
    currentScene = scene;
    currentLineIndex = 0;

    if (scene.type === "dialog") {
      showDialogMode();
      showLine(0);
    } else if (scene.type === "choice") {
      showChoiceMode(scene);
    } else if (scene.type === "end") {
      showEnd();
    }
  }

  // ── Dialog mode ────────────────────────────────
  function showDialogMode() {
    dialogUI.style.display = 'flex';
    choiceUI.style.display = 'none';
  }

  function showLine(index) {
    const scene = currentScene;
    if (index >= scene.lines.length) {
      goToScene(scene.next);
      return;
    }
    const line = scene.lines[index];
    setBackground(line.background);
    setCharacter(line.image);
    dialogText.innerHTML = `<strong>${line.speaker}</strong><br>${line.text}`;
  }

  nextBtn.addEventListener('click', () => {
    currentLineIndex++;
    showLine(currentLineIndex);
  });

  // ── Choice mode ────────────────────────────────
  function showChoiceMode(scene) {
    dialogUI.style.display = 'none';
    choiceUI.style.display = 'flex';
    setBackground(scene.background);
    setCharacter(scene.character !== undefined ? scene.character : '');

    choiceUI.innerHTML = '';
    scene.choices.forEach(choice => {
      const box = document.createElement('div');
      box.className = 'choice-box';
      box.innerHTML = `<div class="choice-text">${choice.text}</div>`;
      box.addEventListener('click', () => goToScene(choice.next));
      choiceUI.appendChild(box);
    });
  }

  // ── End screen ─────────────────────────────────
  function showEnd() {
    dialogUI.style.display = 'none';
    choiceUI.style.display = 'none';
    endScreen.style.display = 'flex';
  }

  // ── Start ──────────────────────────────────────
  function startGame() {
    endScreen.style.display = 'none';
    currentBg = '';
    currentChar = '';
    goToScene('intro');
  }

  startGame();
</script>
</body>
</html>
