<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>games9</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      color: white;
      background: #000;
    }

    /* Main container centers everything */
    .scene-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* The frame maintains 900:450 aspect ratio and scales to fit screen */
    .frame {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: calc(100vw * 450 / 900); /* Maintain aspect ratio based on width */
      overflow: hidden;
      background: #000;
    }

    /* Alternative constraint: if height is limiting factor */
    @media (min-aspect-ratio: 900/450) {
      .frame {
        max-width: calc(100vh * 900 / 450);
        max-height: 100vh;
      }
    }

    /* All images fill the frame and scale together */
    .frame img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    /* Layer ordering */
    .background {
      z-index: 1;
    }
    
    .character {
      bottom: 200px;
      z-index: 2;
      object-fit: contain; /* Keep character proportions */
    }

    /* New container to group dialog box and button, and center them both */
    #dialog-and-button-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      /* Centers the combined width */
      transform: translateX(-50%); 
      display: flex;
      /* Align to the bottom of the logbox (fixes vertical position) */
      align-items: flex-end; 
      max-width: 1800px; /* INCREASED: Very wide limit for large screens */
      width: 95%; /* Use 95% to ensure spacing on wide screens */
      z-index: 10;
    }

    /* Dialog box - will now grow to fill space */
    #logbox {
      position: static; 
      transform: none; 
      width: auto; 
      max-width: none; /* NEW: Removed fixed width constraint for maximum expansion */
      padding: 15px 10px; 
      border-radius: 15px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      backdrop-filter: blur(10px);
      border: 2px solid #666;
      box-sizing: border-box;
      z-index: 10;
      flex-grow: 1; 
      min-height: 90px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }

    .dialog-text {
      max-width: 100%; 
      margin: 0 auto;
      font-size: clamp(14px, 2vw, 18px); 
      line-height: 1.4em;
      text-align: center;
      margin-bottom: 0; 
      white-space: pre-wrap; 
      padding: 10px 0; 
    }

    /* Buttons container - OUTSIDE logbox, aligned right next to it */
    .buttons-container {
      margin-top: 0; 
      text-align: left; 
      padding-right: 0;
      margin-left: 10px; /* Space between dialog and button */
      margin-bottom: 0;
      flex-shrink: 0; 
    }

    .image-btn {
      cursor: pointer;
      width: clamp(50px, 7vw, 70px); 
      height: clamp(64px, 9vw, 90px);
      border: none;
      background: transparent;
      padding: 0;
      /* Adjusted to align button visually with the text box */
      transform: translateY(-5px); 
    }

    .image-btn:hover {
      opacity: 0.8;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      #dialog-and-button-container {
        width: 98%; 
        align-items: center; 
      }
      
      #logbox {
        padding: 15px 10px;
        max-width: 100%; 
        min-height: 70px; 
      }
      
      .buttons-container {
        margin-left: 5px;
      }

      .image-btn {
        transform: translateY(0); 
      }
    }
  </style>
</head>
<body>
  <div class="scene-container">
    <div class="frame" id="sceneFrame">
      <img id="background" class="background" alt="Background" src="back/14.jpg" />
      <img id="character" class="character" alt="Character" />
    </div>
  </div>
  
  <div id="dialog-and-button-container">
    <div id="logbox">
      <div class="dialog-text" id="dialogText"></div>
    </div>
    <div class="buttons-container">
      <img src="TOS-Badge.webp" alt="Next" class="image-btn" id="nextBtn" />
    </div>
  </div>

<script>
  const backgroundImg = document.getElementById('background');
  const characterImg = document.getElementById('character');
  const dialogText = document.getElementById('dialogText');
  const nextBtn = document.getElementById('nextBtn');

  const dialogSequence = [
    { speaker: "Edith", text: "What are your names?", image: "forever8.webp", background: "back/forever-back2.webp" },
    { speaker: "Kirk", text: "Mine is Jim Kirk. His is Spock.", image: "forever14.webp", background: "back/forever-back1.webp" },
    { speaker: "Spock", text: "...", image: "forever21.webp", background: "back/forever-back1.webp" },
    { speaker: "Edith", text: "I'm Edith Keeler. you and your friend can start now by cleaning up down here.", image: "forever8.webp", background: "back/forever-back2.webp" },
    { speaker: "Kirk", text: "Well, Mister Spock, here we are again. Playing Tralane's little game.", image: "forever22.webp", background: "back/forever-back5.jpg" },
    { speaker: "Spock", text: "What should we do, Captain?", image: "forever15.webp", background: "back/forever-back1.webp" },
    { speaker: "Kirk", text: "We clean, Mister Spock, we clean", image: "forever22.webp", background: "back/forever-back1.webp" },
    { speaker: "Edith", text: "Mister Kirk. You are uncommon workmen. That basement looks like it's been scrubbed and polished. I still have a few questions I'd like to ask about you two.", image: "forever8.webp", background: "back/forever-back2.webp" },
    { speaker: "Edith", text: "Oh, and don't give me that questions about little old us? look. You know as well as I do how out of place you two are around here.", image: "forever18.webp", background: "back/forever-back5.jpg" },
    { speaker: "Spock", text: "Where would you estimate we belong, Miss Keeler?", image: "forever15.webp", background: "back/forever-back1.webp" },
    { speaker: "Edith", text: "At his side, as if you've always been there and always will. And you? You belong in another place. I don't know where or how. I'll figure it out eventually.", image: "forever18.webp", background: "back/forever-back5.jpg" },
    { speaker: "Edith", text: "Mister Kirk, are you SURE there's nothing you need to tell me?", image: "forever18.webp", background: "back/forever-back5.jpg" },
    { speaker: "Kirk", text: "We are from another place yes, but we're just lost travelers just like everyone else here I assure you. I'm from Iowa.", image: "forever22.webp", background: "back/forever-back1.webp" },
    { speaker: "Edith", text: "Mister Kirk, you amuse me, but you say very little. A man of perpetual mystery. Keep your secrets, for now.", image: "forever18.webp", background: "back/forever-back5.jpg" },
    { speaker: "Uhura", image: "uhura1.webp", visible: 0, text: "Captain!", background: "back/02.jpg" },
    { speaker: "Tralane", text: "KIRK! Always the ladies man! But you forget why we're here. The prosecution call upon its next witness...", image: "trelane16.webp", background: "back/18.jpg" },
    { speaker: "Kirk", image: "MW-037.webp", visible: 0, text: "NO! Tralane, you've PLAYED your game, we ALL played along, like good little boys. Its time to put the playthings away now. I have a ship to run. Playtime is over now.", background: "back/14.jpg" },
    { speaker: "Tralane", text: "Oh, the trial has just begun. The time for games is over I agree. This may hurt a bit...", image: "trelane16.webp", background: "back/18.jpg" },
    { speaker: "Kirk", image: "MW-037.webp", visible: 0, text: "Oh no.", background: "back/14.jpg" },
    { speaker: " ", image: "ships/constilation1.png", visible: 0, text: " ", background: "back/background6.jpg" },
    { speaker: "Kirk", image: "MW-037.webp", visible: 0, text: "Mister SPOCK!", background: "back/14.jpg" },
    { speaker: "Spock", image: "i-m-095.webp", visible: 0, text: "It's the USS Constellation, Captain. Power is at 1%. I'm reading only 1 life form onboard.", background: "back/10.jpg" },
    { speaker: "Kirk", image: "MW-037.webp", visible: 0, text: "Lieutenant Uhura, can you get it on the viewscreen?", background: "back/14.jpg" },
    { speaker: "Kirk", text: "MATT! Can you hear me? It's Jim Kirk.", background: "back/dscreen1.jpg" },
    { speaker: "Decker", image: "decker6.webp", visible: 0, text: "Kirk...Jim Kirk.", background: "back/decker1.webp" },
    { speaker: "Kirk", text: "YES, Its Jim.", background: "back/dscreen.webp" },
    { speaker: "Decker", image: "decker5.webp", visible: 0, text: "ship. Attacked. That, that thing.", background: "back/decker1.webp" },
  ];

  let currentIndex = 0;

  // Prevent image dragging
  document.querySelectorAll('.frame img').forEach(img => {
    img.addEventListener('dragstart', e => e.preventDefault());
  });

  function showDialog(index) {
    if (index >= dialogSequence.length) {
      location.href = 'game10.html';
      return;
    }

    const d = dialogSequence[index];

    // Update background
    if (d.background) {
      backgroundImg.src = d.background;
    }

    // Fade out character
    characterImg.style.opacity = '0';

    // Update character image and fade in
    setTimeout(() => {
      characterImg.src = d.image;
      dialogText.innerHTML = `<strong>${d.speaker}</strong><br>${d.text}`;
      
      // Only fade in if not the "nothing" image
      if (!d.image.includes('nothing.png')) {
        setTimeout(() => {
          characterImg.style.opacity = '1';
        }, 150);
      }
    }, 300);
  }

  nextBtn.addEventListener('click', () => {
    currentIndex++;
    showDialog(currentIndex);
  });

  // Start
  showDialog(0);
</script>

</body>
</html>
