<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>02</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      color: white;
      background: #000;
    }

    /* Main container centers everything */
    .scene-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* The frame maintains 900:450 aspect ratio and scales to fit screen */
    .frame {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: calc(100vw * 450 / 900); /* Maintain aspect ratio based on width */
      overflow: hidden;
      background: #000;
    }

    /* Alternative constraint: if height is limiting factor */
    @media (min-aspect-ratio: 900/450) {
      .frame {
        max-width: calc(100vh * 900 / 450);
        max-height: 100vh;
      }
    }

    /* All images fill the frame and scale together */
    .frame img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    /* Layer ordering */
    .background {
      z-index: 1;
    }
    
    .character {
      bottom: 200px;
      z-index: 2;
      object-fit: contain; /* Keep character proportions */
    }

    /* New container to group dialog box and button, and center them both */
    #dialog-and-button-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      /* Centers the combined width */
      transform: translateX(-50%); 
      display: flex;
      /* Align to the bottom of the logbox (fixes vertical position) */
      align-items: flex-end; 
      max-width: 1800px; /* INCREASED: Very wide limit for large screens */
      width: 95%; /* Use 95% to ensure spacing on wide screens */
      z-index: 10;
    }

    /* Dialog box - will now grow to fill space */
    #logbox {
      position: static; 
      transform: none; 
      width: auto; 
      max-width: none; /* NEW: Removed fixed width constraint for maximum expansion */
      padding: 15px 10px; 
      border-radius: 15px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      backdrop-filter: blur(10px);
      border: 2px solid #666;
      box-sizing: border-box;
      z-index: 10;
      flex-grow: 1; /* This makes it take all space available after button space is used */
      min-height: 90px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }

    .dialog-text {
      max-width: 100%; 
      margin: 0 auto;
      font-size: clamp(14px, 2vw, 18px); 
      line-height: 1.4em;
      text-align: center;
      margin-bottom: 0; 
      white-space: pre-wrap; 
      padding: 10px 0; 
    }

    /* Buttons container - OUTSIDE logbox, aligned right next to it */
    .buttons-container {
      margin-top: 0; 
      text-align: left; 
      padding-right: 0;
      margin-left: 10px; /* Space between dialog and button */
      margin-bottom: 0;
      flex-shrink: 0; 
    }

    .image-btn {
      cursor: pointer;
      width: clamp(50px, 7vw, 70px); 
      height: clamp(64px, 9vw, 90px);
      border: none;
      background: transparent;
      padding: 0;
      /* Adjusted to align button visually with the text box */
      transform: translateY(-5px); 
    }

    .image-btn:hover {
      opacity: 0.8;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      #dialog-and-button-container {
        width: 98%; 
        align-items: center; 
      }
      
      #logbox {
        padding: 15px 10px;
        max-width: 100%; 
        min-height: 70px; 
      }
      
      .buttons-container {
        margin-left: 5px;
      }

      .image-btn {
        transform: translateY(0); 
      }
    }
  </style>
</head>
<body>
  <div class="scene-container">
    <div class="frame" id="sceneFrame">
      <img id="background" class="background" alt="Background" src="back/14.jpg" />
      <img id="character" class="character" alt="Character" />
    </div>
  </div>
  
  <div id="dialog-and-button-container">
    <div id="logbox">
      <div class="dialog-text" id="dialogText"></div>
    </div>
    <div class="buttons-container">
      <img src="TOS-Badge.webp" alt="Next" class="image-btn" id="nextBtn" />
    </div>
  </div>

<script>
  const backgroundImg = document.getElementById('background');
  const characterImg = document.getElementById('character');
  const dialogText = document.getElementById('dialogText');
  const nextBtn = document.getElementById('nextBtn');

  const dialogSequence = [
{ speaker: " ", image: "MW-066.webp", visible: 0, text: ".", background: "back/tporter4b.jpg" },
{ speaker: "Mudd", image: "MW-062.webp", visible: 0, text: "Meaning no ingratitude, gentlemen, but just where is it I find meself?", background: "back/pad.jpg" },
{ speaker: "McCoy", image: "MW-056.webp", visible: 0, text: "You're aboard the U.S.S. Enterprise.", background: "back/tporter4.jpg" },
{ speaker: "Mudd", image: "MW-063.webp", visible: 0, text: "It's really a darn beautiful ship, isn't it? Really a beautiful ship.", background: "back/pad.jpg" },
{ speaker: "Mudd", image: "MW-065.webp", visible: 0, text: "Oh, the name, gentlemen, is Walsh, Captain Leo Walsh.", background: "back/pad.jpg" },
{ speaker: "Spock", image: "MW-056.webp", visible: 0, text: "How many more in your crew?", background: "back/tporter4.jpg" },
{ speaker: "Mudd", image: "MW-064.webp", visible: 0, text: "Just a few more.", background: "back/pad.jpg" },
{ speaker: "Scott", image: "MW-066.webp", visible: 0, text: "Your vessel's breaking up, man. If we don't get them over here right now", background: "back/tporter4b.jpg" },
{ speaker: "Mudd", image: "MW-067.webp", visible: 0, text: "We couldn't be sure you was a friendly vessel, now could we." },
{ speaker: "Mudd", image: "MW-074.webp", visible: 0, text: "Ah, but the three will be in position about by now." },
{ speaker: "Sulu", image: "MW-069.webp", visible: 0, text: "Another lithium circuit. Now supplementing with battery power, sir.", background: "back/23.jpg" },
{ speaker: "Kirk", image: "MW-070.webp", visible: 0, text: "Scotty, how many of them did you get aboard?", background: "back/02.jpg" },
{ speaker: "Scott", image: "MW-056.webp", visible: 0, text: "Only one, sir, but we've locked onto three more.", background: "back/tporter4.jpg" },
{ speaker: "Spock", image: "MW-056.webp", visible: 0, text: "What's wrong?" },
{ speaker: "Scott", image: "MW-056.webp", visible: 0, text: "I don't know, sir. With those three lithium crystals gone" },
{ speaker: "Spock", image: "MW-056.webp", visible: 0, text: "It'll take longer on battery power." },
{ speaker: "McCoy", image: "MW-066.webp", visible: 0, text: "Never trusted this." },
{ speaker: "Farrell", image: "back/nothing.webp", visible: 0, text: "There she goes.", background: "back/screen5.jpg" },
{ speaker: "Sulu", image: "back/nothing.webp", visible: 0, text: "Asteroid hit him dead centre.", background: "back/screen6.jpg" },
{ speaker: "Kirk", image: "MW-076.webp", visible: 0, text: "Bridge to transporter room. Their vessel has been hit by an asteroid. It's gone. Did you get the crew off?", background: "back/02.jpg" },
{ speaker: "Scott", image: "MW-056.webp", visible: 0, text: "Not yet, sir, but we've hooked onto something.", background: "back/tporter4.jpg" },
  ];

  let currentIndex = 0;

  // Prevent image dragging
  document.querySelectorAll('.frame img').forEach(img => {
    img.addEventListener('dragstart', e => e.preventDefault());
  });

  function showDialog(index) {
    if (index >= dialogSequence.length) {
      location.href = 'tport-mudds2.html';
      return;
    }

    const d = dialogSequence[index];

    // Update background
    if (d.background) {
      backgroundImg.src = d.background;
    }

    // Fade out character
    characterImg.style.opacity = '0';

    // Update character image and fade in
    setTimeout(() => {
      characterImg.src = d.image;
      dialogText.innerHTML = `<strong>${d.speaker}</strong><br>${d.text}`;
      
      // Only fade in if not the "nothing" image
      if (!d.image.includes('nothing.webp')) {
        setTimeout(() => {
          characterImg.style.opacity = '1';
        }, 150);
      }
    }, 300);
  }

  nextBtn.addEventListener('click', () => {
    currentIndex++;
    showDialog(currentIndex);
  });

  // Start
  showDialog(0);
</script>

</body>
</html>
