<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Captain's Log Intro</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      color: white;
    }

    #starfield {
      position: fixed;
      top: 0;
      left: 0;
      width: 300%;
      height: 100%;
      background: black url('back/background6.jpg') repeat-x;
      animation: scrollStars 60s linear infinite;
      z-index: -1;
    }

    @keyframes scrollStars {
      0% { transform: translateX(0); }
      100% { transform: translateX(-66.66%); }
    }

    #ship {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-height: 40%;
      z-index: 1;
    }

    #logbox {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
      font-size: 18px;
      line-height: 1.4em;
      border-top: 1px solid #444;
    }

    #continue-button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      background: #0ff;
      color: #000;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #continue-button:hover {
      background: #0cc;
    }
  </style>
</head>
<body>
  <div id="starfield"></div>
  <img id="ship" src="ships/enterprise-7.png" alt="Starship" />

  <div id="logbox">
    <div>
      <strong>Captain's log, stardate 4978.4.</strong><br>   
We are approaching the Arcadian star system on a mission to locate an old friend.
    </div>
    <button id="continue-button" onclick="location.href='MP01.html'">Continue</button>
  </div>
</body>
</html>
