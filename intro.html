<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Start</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden; /* Prevent scrolling */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Full viewport height */
            background-image: url('back/planet-c.png');
            background-size: cover; /* Cover the entire area */
            background-position: center; /* Center the image */
            background-repeat: no-repeat; /* Do not repeat the image */
        }

        /* Styles for the button container to center it if needed */
        .button-container {
            text-align: center;
            position: absolute; /* Position the button relative to the body */
            top: 65%; /* Adjust as needed to position it below the image */
            left: 50%;
            transform: translateX(-50%); /* Center horizontally */
            z-index: 20; /* Ensure it's above the image */
        }

        .start-button {
            padding: 1rem 2.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff; /* White text */
            background-color: #6366f1; /* Indigo 500 */
            border: none;
            border-radius: 9999px; /* Fully rounded */
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .start-button:hover {
            background-color: #4f46e5; /* Indigo 600 on hover */
            transform: scale(1.05); /* Slightly enlarge on hover */
        }

        .start-button:active {
            background-color: #4338ca; /* Indigo 700 on active */
            transform: scale(0.98); /* Slightly shrink on click */
        }

        /* New styles for the drifting image */
        #drifting-image-container {
            position: absolute;
            top: 50%; /* Center vertically */
            left: -20%; /* Start off-screen to the left, adjust as needed based on image width */
            transform: translateY(-50%); /* Adjust for vertical centering */
            opacity: 0; /* Initially hidden */
            z-index: 10; /* Ensure it's above the background but below other potential elements */
            width: 400px; /* Updated width based on user's input (400px) */
            height: 200px; /* Explicitly set height based on user's input (200px) */
        }

        #drifting-image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Ensure the image fits within the container without cropping */
        }

        /* Keyframes for the drifting and fading animation */
        @keyframes imageDriftAndFadeIn {
            0% {
                left: -20%; /* Start off-screen */
                opacity: 0;
                transform: translateY(-50%);
            }
            10% {
                opacity: 1; /* Fade in quickly at the beginning */
            }
            100% {
                left: 50%; /* Drift across to the center */
                opacity: 1; /* Stay fully opaque */
                transform: translate(-50%, -50%); /* Center the image */
            }
        }

        /* Initially hide the start button container */
        #start-button-container {
            display: none;
        }
    </style>
</head>
<body>
    <audio id="backgroundMusic" src="star-trek.mp3" loop preload="auto"></audio>

    <div id="drifting-image-container">
        <img src="ships/ship7.png" alt="Drifting Image">
    </div>

    <div class="button-container" id="start-button-container">
        <button class="start-button" onclick="startGame()">Start Game</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            const driftingImageContainer = document.getElementById('drifting-image-container');
            const startButtonContainer = document.getElementById('start-button-container');
            // Adjust this duration to control how fast the image drifts to the center
            const animationDuration = 6000; // 6 seconds for the drift animation

            // Apply the animation to the image container
            driftingImageContainer.style.animation = `imageDriftAndFadeIn ${animationDuration / 1000}s forwards`;

            // After the animation, display the button (and keep the image visible)
            setTimeout(() => {
                driftingImageContainer.style.display = 'block'; // Keep the image visible
                startButtonContainer.style.display = 'block'; // Show the button container
            }, animationDuration);
        });

        function startGame() {
            console.log("Start Game button clicked!"); // Added for debugging
            const backgroundMusic = document.getElementById('backgroundMusic');
            // Attempt to play the music. This will succeed because it's triggered by user interaction.
            backgroundMusic.play().catch(error => {
                console.error("Failed to play background music:", error);
                // Handle cases where play() might still fail (e.g., specific browser settings)
            });

            // Replace 'dialog.html' with the actual path to your next HTML file
            window.location.href = 'main-hub.html';
        }
    </script>
</body>
</html>
