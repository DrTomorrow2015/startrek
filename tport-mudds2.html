<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transporter Room</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
body {
  background: url('back/pad.jpg') no-repeat center center fixed;
  background-size: cover;
}
#character {
  position: absolute;
  top: 100px; /* Or bottom: 5%; - choose one! */
  left: 0; /* Align to the left edge */
  right: 0; /* Align to the right edge */
  margin: auto; /* Distribute available space equally on both sides */
  width: 449px;
  height: 442px;
  opacity: 0;
  transition: opacity 1s ease;
  visibility: hidden;
}
    #character.loaded {
      visibility: visible; /* Show immediately when loaded */
    }
  </style>
</head>
<body>
   <img id="character" src="back/women.gif" alt=" ">

  <script>
    const img = document.getElementById('character');
    let imageLoaded = false;
    let startTime = Date.now();

    // Function to handle the animation sequence
    function startSequence() {
      // Show the teleport GIF first
      img.classList.add('loaded');
      img.style.opacity = 1;
      
      // Swap to character GIF after 1.5 seconds from when sequence starts
      setTimeout(() => {
        img.src = 'MW-088.webp';
      }, 1500);
      
      // Keep character visible for 2.5 more seconds, then redirect
      setTimeout(() => {
        window.location.href = "MW-03.html";
      }, 4000);
    }

    // Wait for the first image to load
    img.onload = function() {
      if (!imageLoaded) {
        imageLoaded = true;
        // If the image loads quickly (within 100ms), start immediately
        // Otherwise, give it a moment to be visible
        const loadTime = Date.now() - startTime;
        if (loadTime < 100) {
          startSequence();
        } else {
          setTimeout(startSequence, 200);
        }
      }
    };

    // Fallback: start sequence after 500ms even if image hasn't loaded
    setTimeout(() => {
      if (!imageLoaded) {
        console.log('Starting sequence without waiting for image load');
        startSequence();
      }
    }, 800);

    // Preload the second GIF to ensure smooth transition
    const preloadImg = new Image();
    preloadImg.src = 'alien1.gif';
  </script>
</body>
</html>
