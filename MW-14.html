<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>14</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      color: white;
      background: #000;
    }

    /* Main container centers everything */
    .scene-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* The frame maintains 900:450 aspect ratio and scales to fit screen */
    .frame {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: calc(100vw * 450 / 900); /* Maintain aspect ratio based on width */
      overflow: hidden;
      background: #000;
    }

    /* Alternative constraint: if height is limiting factor */
    @media (min-aspect-ratio: 900/450) {
      .frame {
        max-width: calc(100vh * 900 / 450);
        max-height: 100vh;
      }
    }

    /* All images fill the frame and scale together */
    .frame img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    /* Layer ordering */
    .background {
      z-index: 1;
    }
    
    .character {
      bottom: 200px;
      z-index: 2;
      object-fit: contain; /* Keep character proportions */
    }

    /* New container to group dialog box and button, and center them both */
    #dialog-and-button-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      /* Centers the combined width */
      transform: translateX(-50%); 
      display: flex;
      /* Align to the bottom of the logbox (fixes vertical position) */
      align-items: flex-end; 
      max-width: 1800px; /* INCREASED: Very wide limit for large screens */
      width: 95%; /* Use 95% to ensure spacing on wide screens */
      z-index: 10;
    }

    /* Dialog box - will now grow to fill space */
    #logbox {
      position: static; 
      transform: none; 
      width: auto; 
      max-width: none; /* NEW: Removed fixed width constraint for maximum expansion */
      padding: 15px 10px; 
      border-radius: 15px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      backdrop-filter: blur(10px);
      border: 2px solid #666;
      box-sizing: border-box;
      z-index: 10;
      flex-grow: 1; /* This makes it take all space available after button space is used */
      min-height: 90px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }

    .dialog-text {
      max-width: 100%; 
      margin: 0 auto;
      font-size: clamp(14px, 2vw, 18px); 
      line-height: 1.4em;
      text-align: center;
      margin-bottom: 0; 
      white-space: pre-wrap; 
      padding: 10px 0; 
    }

    /* Buttons container - OUTSIDE logbox, aligned right next to it */
    .buttons-container {
      margin-top: 0; 
      text-align: left; 
      padding-right: 0;
      margin-left: 10px; /* Space between dialog and button */
      margin-bottom: 0;
      flex-shrink: 0; 
    }

    .image-btn {
      cursor: pointer;
      width: clamp(50px, 7vw, 70px); 
      height: clamp(64px, 9vw, 90px);
      border: none;
      background: transparent;
      padding: 0;
      /* Adjusted to align button visually with the text box */
      transform: translateY(-5px); 
    }

    .image-btn:hover {
      opacity: 0.8;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      #dialog-and-button-container {
        width: 98%; 
        align-items: center; 
      }
      
      #logbox {
        padding: 15px 10px;
        max-width: 100%; 
        min-height: 70px; 
      }
      
      .buttons-container {
        margin-left: 5px;
      }

      .image-btn {
        transform: translateY(0); 
      }
    }
  </style>
</head>
<body>
  <div class="scene-container">
    <div class="frame" id="sceneFrame">
      <img id="background" class="background" alt="Background" src="back/14.jpg" />
      <img id="character" class="character" alt="Character" />
    </div>
  </div>
  
  <div id="dialog-and-button-container">
    <div id="logbox">
      <div class="dialog-text" id="dialogText"></div>
    </div>
    <div class="buttons-container">
      <img src="TOS-Badge.webp" alt="Next" class="image-btn" id="nextBtn" />
    </div>
  </div>

<script>
  const backgroundImg = document.getElementById('background');
  const characterImg = document.getElementById('character');
  const dialogText = document.getElementById('dialogText');
  const nextBtn = document.getElementById('nextBtn');

  const dialogSequence = [
    { speaker: "Kirk", image: "MW-409.webp", visible: 0, text: "I asked for a preorbital course, Mister Farrell.", background: "back/21.jpg" },
    { speaker: "Farrell", image: "MW-411.webp", visible: 0, text: "Preorbital course locked in, sir.", background: "back/19.jpg" },
    { speaker: "Kirk", image: "MW-414.webp", visible: 0, text: "That's the last time I'm giving an order twice, gentlemen.", background: "back/06.jpg" },
    { speaker: " ", image: "MW-418.webp", visible: 0, text: " .", background: "back/10.jpg" },
    { speaker: "Kirk", image: "MW-414.webp", visible: 0, text: "We're down to battery power, and we're low on that.", background: "back/21.jpg" },
    { speaker: "Scott", image: "MW-413.webp", visible: 0, text: "It'll get us to Rigel 12, sir, but it'll be a shaky orbit.", background: "back/21.jpg" },
    { speaker: "Kirk", image: "MW-412.webp", visible: 0, text: "Just hang us in long enough to get six crystals, Scotty. That's all we need.", background: "back/21.jpg" },
    { speaker: "Scott", image: "MW-413.webp", visible: 0, text: "I'll get you there.", background: "back/21.jpg" },
    { speaker: "Kirk", image: "MW-416.webp", visible: 0, text: "Ridiculous. What are we running here. Did you examine them? Did you examine Eve?", background: "back/21.jpg" },
    { speaker: "McCoy", image: "MW-422.webp", visible: 0, text: "She refused.", background: "back/21.jpg" },
    { speaker: "Kirk", image: "MW-264.webp", visible: 0, text: "Well, come on, you're the doctor. What is it? Is it that we're tired, and they're beautiful? They are incredibly beautiful.", background: "back/21.jpg" },
    { speaker: "McCoy", image: "MW-328.webp", visible: 0, text: "Are they, Jim? Are they actually more lovely, pound for pound, measurement for measurement, than any other women you've known?", background: "back/21.jpg" },
    { speaker: "McCoy", image: "MW-349.webp", visible: 0, text: "Or is it that they just, well, act beautiful. No. Strike that, strike that.", background: "back/21.jpg" },
    { speaker: "Kirk", image: "MW-322.webp", visible: 0, text: "What are they?", background: "back/21.jpg" },
    { speaker: "McCoy", image: "MW-338.webp", visible: 0, text: "You mean are they alien illusions? That sort of thing?", background: "back/21.jpg" },
    { speaker: "Kirk", image: "MW-168.webp", visible: 0, text: "I asked you first.", background: "back/21.jpg" },
    { speaker: "McCoy", image: "MW-422.webp", visible: 0, text: "No, an alien smart enough to pull this could also keep my medical scanner from going beep!", background: "back/21.jpg" },
    { speaker: "Kirk", image: "MW-166.webp", visible: 0, text: "I don't follow you.", background: "back/21.jpg" },
    { speaker: "McCoy", image: "MW-351.webp", visible: 0, text: "I don't either.", background: "back/21.jpg" },
    { speaker: "Magda", image: "MW-423.webp", visible: 0, text: "Top space frequency of three nine.", background: "back/quarters4.jpg" },
    { speaker: "Mudd", image: "MW-424.webp", visible: 0, text: " " },
    { speaker: "Mudd", image: "MW-425.webp", visible: 0, text: " " },
    { speaker: "Mudd", image: "MW-428.webp", visible: 0, text: "Rigel 12. Rigel 12." },
    { speaker: "Childress", image: "MW-428.webp", visible: 0, text: "This is Rigel 12. Come in, Enterprise." },
    { speaker: "Mudd", image: "MW-428.webp", visible: 0, text: "Well, this isn't exactly the Enterprise. My name is Harry Mudd. To whom have I the pleasure of speaking, sir?" },
    { speaker: "Sulu", image: "MW-015.webp", visible: 0, text: "Power curve still dropping, Captain.", background: "back/19.jpg" },
    { speaker: "Farrell", image: "MW-028.webp", visible: 0, text: "We'll make orbit, sir. A temporary one.", background: "back/19.jpg" },
    { speaker: "Kirk", image: "MW-007.webp", visible: 0, text: "Lay in. Computer?", background: "back/16.jpg" },
    { speaker: "Spock", image: "MW-418.webp", visible: 0, text: "We can sustain this orbit for three days, seven hours.", background: "back/10.jpg" },
    { speaker: "Kirk", image: "MW-007.webp", visible: 0, text: "More than enough time. Communications, have a representative of the Rigel 12 miners meet us here to discuss our needs. Beam him up first pass over their camp.", background: "back/16.jpg" },
    { speaker: "Uhura", image: "MW-014.webp", visible: 0, text: "Yes, sir.", background: "back/10.jpg" },
  ];

  let currentIndex = 0;

  // Prevent image dragging
  document.querySelectorAll('.frame img').forEach(img => {
    img.addEventListener('dragstart', e => e.preventDefault());
  });

  function showDialog(index) {
    if (index >= dialogSequence.length) {
      location.href = 'MW-15.html';
      return;
    }

    const d = dialogSequence[index];

    // Update background
    if (d.background) {
      backgroundImg.src = d.background;
    }

    // Fade out character
    characterImg.style.opacity = '0';

    // Update character image and fade in
    setTimeout(() => {
      characterImg.src = d.image;
      dialogText.innerHTML = `<strong>${d.speaker}</strong><br>${d.text}`;
      
      // Only fade in if not the "nothing" image
      if (!d.image.includes('nothing.webp')) {
        setTimeout(() => {
          characterImg.style.opacity = '1';
        }, 150);
      }
    }, 300);
  }

  nextBtn.addEventListener('click', () => {
    currentIndex++;
    showDialog(currentIndex);
  });

  // Start
  showDialog(0);
</script>

</body>
</html>
