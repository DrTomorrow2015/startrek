<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>03</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      color: white;
      background: #000;
    }

    /* Main container centers everything */
    .scene-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* The frame maintains 900:450 aspect ratio and scales to fit screen */
    .frame {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: calc(100vw * 450 / 900); /* Maintain aspect ratio based on width */
      overflow: hidden;
      background: #000;
    }

    /* Alternative constraint: if height is limiting factor */
    @media (min-aspect-ratio: 900/450) {
      .frame {
        max-width: calc(100vh * 900 / 450);
        max-height: 100vh;
      }
    }

    /* All images fill the frame and scale together */
    .frame img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    /* Layer ordering */
    .background {
      z-index: 1;
    }
    
    .character {
      bottom: 200px;
      z-index: 2;
      object-fit: contain; /* Keep character proportions */
    }

    /* New container to group dialog box and button, and center them both */
    #dialog-and-button-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      /* Centers the combined width */
      transform: translateX(-50%); 
      display: flex;
      /* Align to the bottom of the logbox (fixes vertical position) */
      align-items: flex-end; 
      max-width: 1800px; /* INCREASED: Very wide limit for large screens */
      width: 95%; /* Use 95% to ensure spacing on wide screens */
      z-index: 10;
    }

    /* Dialog box - will now grow to fill space */
    #logbox {
      position: static; 
      transform: none; 
      width: auto; 
      max-width: none; /* NEW: Removed fixed width constraint for maximum expansion */
      padding: 15px 10px; 
      border-radius: 15px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      backdrop-filter: blur(10px);
      border: 2px solid #666;
      box-sizing: border-box;
      z-index: 10;
      flex-grow: 1; /* This makes it take all space available after button space is used */
      min-height: 90px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }

    .dialog-text {
      max-width: 100%; 
      margin: 0 auto;
      font-size: clamp(14px, 2vw, 18px); 
      line-height: 1.4em;
      text-align: center;
      margin-bottom: 0; 
      white-space: pre-wrap; 
      padding: 10px 0; 
    }

    /* Buttons container - OUTSIDE logbox, aligned right next to it */
    .buttons-container {
      margin-top: 0; 
      text-align: left; 
      padding-right: 0;
      margin-left: 10px; /* Space between dialog and button */
      margin-bottom: 0;
      flex-shrink: 0; 
    }

    .image-btn {
      cursor: pointer;
      width: clamp(50px, 7vw, 70px); 
      height: clamp(64px, 9vw, 90px);
      border: none;
      background: transparent;
      padding: 0;
      /* Adjusted to align button visually with the text box */
      transform: translateY(-5px); 
    }

    .image-btn:hover {
      opacity: 0.8;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      #dialog-and-button-container {
        width: 98%; 
        align-items: center; 
      }
      
      #logbox {
        padding: 15px 10px;
        max-width: 100%; 
        min-height: 70px; 
      }
      
      .buttons-container {
        margin-left: 5px;
      }

      .image-btn {
        transform: translateY(0); 
      }
    }
  </style>
</head>
<body>
  <div class="scene-container">
    <div class="frame" id="sceneFrame">
      <img id="background" class="background" alt="Background" src="back/14.jpg" />
      <img id="character" class="character" alt="Character" />
    </div>
  </div>
  
  <div id="dialog-and-button-container">
    <div id="logbox">
      <div class="dialog-text" id="dialogText"></div>
    </div>
    <div class="buttons-container">
      <img src="TOS-Badge.webp" alt="Next" class="image-btn" id="nextBtn" />
    </div>
  </div>

<script>
  const backgroundImg = document.getElementById('background');
  const characterImg = document.getElementById('character');
  const dialogText = document.getElementById('dialogText');
  const nextBtn = document.getElementById('nextBtn');

  const dialogSequence = [
    { speaker: " ", image: "MW-115.webp", visible: 0, text: " ", background: "back/tporter4b.jpg" },
    { speaker: "Kirk", image: "MW-108.webp", visible: 0, text: "Kirk to transporter room. Report.", background: "back/02b.jpg" },
    { speaker: "Mudd", image: "MW-089.webp", visible: 0, text: "It's all right, darlings. We're in good hands.", background: "back/pad.jpg" },
    { speaker: "Kirk", image: "MW-090.webp", visible: 0, text: "Bridge to transporter room.", background: "back/tporter4b.jpg" },
    { speaker: " ", image: "MW-091.webp", visible: 0, text: " ", background: "back/tporter4.jpg" },
    { speaker: " ", image: "MW-092.webp", visible: 1, text: " ", background: "back/pad.jpg" },
    { speaker: " ", image: "MW-093.webp", visible: 0, text: " ", background: "back/tporter4b.jpg" },
    { speaker: "Farrell", image: "MW-075.webp", visible: 0, text: "We're clearing the asteroid belt now, Captain.", background: "back/23.jpg" },
    { speaker: "Kirk", image: "MW-076.webp", visible: 0, text: "Deflector screen down, Mister Farrell. Save the power.", background: "back/02.jpg" },
    { speaker: "Kirk", image: "MW-117.webp", visible: 0, text: "Captain to transporter room. Are you reading me or not, Mister Scott?", background: "back/tporter4b.jpg" },
    { speaker: "Kirk", image: "MW-070.webp", visible: 0, text: "Bridge to transporter room. How many did we get off?", background: "back/02.jpg" },
    { speaker: "Scott", image: "MW-110.webp", visible: 0, text: "Oh, er, four in all, sir.", background: "back/tporter4.jpg" },
    { speaker: "Kirk", image: "MW-070.webp", visible: 0, text: "If that captain can walk, I want him in my cabin immediately. Correction,", background: "back/02.jpg" },
    { speaker: "Kirk", image: "MW-076.webp", visible: 0, text: "I want him there whether he can walk or not. Kirk out." },
    { speaker: "Mudd", image: "MW-106.webp", visible: 0, text: "That fellow sounded a mite upset, didn't he?", background: "back/pad.jpg" },
    { speaker: "McCoy", image: "MW-111.webp", visible: 0, text: "Yes. Yes, they are.", background: "back/tporter4b.jpg" },
    { speaker: "Spock", image: "MW-115.webp", visible: 0, text: "Curious. You're certain this was everyone aboard, Mister Walsh? No other crewmen?", background: "back/tporter4c.jpg" },
    { speaker: "Mudd", image: "MW-089.webp", visible: 0, text: "Oh, no, that's everyone, all right, but so far as the ladies actually being the crew", background: "back/pad.jpg" },
    { speaker: "Spock", image: "MW-115.webp", visible: 0, text: "You can explain that to the Captain.", background: "back/tporter4c.jpg" },
    { speaker: "McCoy", image: "MW-116.webp", visible: 0, text: "Amen to that, Scotty.", background: "back/tporter4b.jpg" },
    { speaker: " ", image: "MW-122.webp", visible: 0, text: " ", background: "back/hall0.jpg"},
    { speaker: "Mudd", image: "MW-089.webp", visible: 0, text: "Ah, sure, these starships are really something marvelous, but men will always be men no matter where they are.", background: "back/hall32.jpg" },
    { speaker: "Mudd", image: "MW-089.webp", visible: 0, text: "Eh, mister? You'll never take that out of them." },
    { speaker: " ", image: "MW-127.webp", visible: 1, text: " ", background: "back/turbo7.jpg" },
    { speaker: "Spock", image: "MW-115.webp", visible: 0, text: "Deck twelve.", background: "back/turbo4.jpg" },
    { speaker: "Mudd", image: "MW-133.webp", visible: 0, text: "You're part Vulcanian, aren't you. Ah well then, a pretty face doesn't affect you at all, does it." },
    { speaker: "Mudd", image: "MW-133.webp", visible: 0, text: "That is, unless you want it to. You can save it, girls. This type can turn himself off from any emotion." },
    { speaker: "Eve", image: "MW-134.webp", visible: 0, text: "I apologize for what he said, sir. He's used to buying and selling people." },
    { speaker: "Mudd", image: "MW-106.webp", visible: 0, text: "I'll handle the conversation, darling." },
    { speaker: " ", image: "MW-139.webp", visible: 0, text: " ", background: "back/quarters24.jpg" },
    { speaker: " ", image: "MW-138.webp", visible: 0, text: " ", background: "back/quarters20.jpg" },
  ];

  let currentIndex = 0;

  // Prevent image dragging
  document.querySelectorAll('.frame img').forEach(img => {
    img.addEventListener('dragstart', e => e.preventDefault());
  });

  function showDialog(index) {
    if (index >= dialogSequence.length) {
      location.href = 'MW-kirks-pad.html';
      return;
    }

    const d = dialogSequence[index];

    // Update background
    if (d.background) {
      backgroundImg.src = d.background;
    }

    // Fade out character
    characterImg.style.opacity = '0';

    // Update character image and fade in
    setTimeout(() => {
      characterImg.src = d.image;
      dialogText.innerHTML = `<strong>${d.speaker}</strong><br>${d.text}`;
      
      // Only fade in if not the "nothing" image
      if (!d.image.includes('nothing.webp')) {
        setTimeout(() => {
          characterImg.style.opacity = '1';
        }, 150);
      }
    }, 300);
  }

  nextBtn.addEventListener('click', () => {
    currentIndex++;
    showDialog(currentIndex);
  });

  // Start
  showDialog(0);
</script>

</body>
</html>
