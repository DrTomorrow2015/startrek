<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Captain's Log Intro</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      color: white;
    }

    #starfield {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 200%;
      background-image: url('back/background6.jpg');
      background-repeat: repeat-y;
      animation: scrollBackground 50s linear infinite;
    }

     @keyframes scrollBackground {
      from {
        transform: translateY(-50%);
      }
      to {
        transform: translateY(0);
      }
    }

    /* Modified CSS for #ship to make it fullscreen */
    #ship {
      position: fixed; /* Use fixed positioning to cover the viewport */
      top: 0;
      left: 0;
      width: 100%; /* Make it fill the width */
      height: 100%; /* Make it fill the height */
      object-fit: cover; /* This is key: it will cover the entire area, maintaining aspect ratio and cropping if necessary */
      z-index: 1; /* Keep it above the starfield */
    }

#logbox {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(0, 0, 0, 0.7);
  padding: 20px;
  box-sizing: border-box;
  text-align: center;
  font-size: 18px;
  line-height: 1.4em;
  border-top: 1px solid #444;
  z-index: 2; /* Added z-index to bring it to the front */
}

    #continue-button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      background: #0ff;
      color: #000;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #continue-button:hover {
      background: #0cc;
    }
  </style>
</head>
<body>
  <div id="starfield"></div>
<img id="ship" src="ships/ship7.png" alt="Starship" />

  <div id="logbox">
    <div>
      <strong>Captain's log.</strong><br>  
Have transported aboard the Enterprise to implement search with infrared scanners and sensing system. Magnetic storms on the planet's surface are cutting down speed and efficiency of our equipment. Search now in progress for three hours, eighteen minutes.
    </div>
    <button id="continue-button" onclick="location.href='MW-17.html'">Continue</button>
  </div>
</body>
</html>
