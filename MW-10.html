<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      color: white;
      background: #000;
    }

    /* Main container centers everything */
    .scene-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* The frame maintains 900:450 aspect ratio and scales to fit screen */
    .frame {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: calc(100vw * 450 / 900); /* Maintain aspect ratio based on width */
      overflow: hidden;
      background: #000;
    }

    /* Alternative constraint: if height is limiting factor */
    @media (min-aspect-ratio: 900/450) {
      .frame {
        max-width: calc(100vh * 900 / 450);
        max-height: 100vh;
      }
    }

    /* All images fill the frame and scale together */
    .frame img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    /* Layer ordering */
    .background {
      z-index: 1;
    }
    
    .character {
      bottom: 200px;
      z-index: 2;
      object-fit: contain; /* Keep character proportions */
    }

    /* New container to group dialog box and button, and center them both */
    #dialog-and-button-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      /* Centers the combined width */
      transform: translateX(-50%); 
      display: flex;
      /* Align to the bottom of the logbox (fixes vertical position) */
      align-items: flex-end; 
      max-width: 1800px; /* INCREASED: Very wide limit for large screens */
      width: 95%; /* Use 95% to ensure spacing on wide screens */
      z-index: 10;
    }

    /* Dialog box - will now grow to fill space */
    #logbox {
      position: static; 
      transform: none; 
      width: auto; 
      max-width: none; /* NEW: Removed fixed width constraint for maximum expansion */
      padding: 15px 10px; 
      border-radius: 15px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      backdrop-filter: blur(10px);
      border: 2px solid #666;
      box-sizing: border-box;
      z-index: 10;
      flex-grow: 1; /* This makes it take all space available after button space is used */
      min-height: 90px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }

    .dialog-text {
      max-width: 100%; 
      margin: 0 auto;
      font-size: clamp(14px, 2vw, 18px); 
      line-height: 1.4em;
      text-align: center;
      margin-bottom: 0; 
      white-space: pre-wrap; 
      padding: 10px 0; 
    }

    /* Buttons container */
    .buttons-container {
      margin-top: 0; 
      text-align: left; 
      padding-right: 0;
      margin-left: 10px; /* Space between dialog and button */
      margin-bottom: 0;
      flex-shrink: 0; 
    }

    .image-btn {
      cursor: pointer;
      width: clamp(50px, 7vw, 70px); 
      height: clamp(64px, 9vw, 90px);
      border: none;
      background: transparent;
      padding: 0;
      /* Adjusted to align button visually with the text box */
      transform: translateY(-5px); 
    }

    .image-btn:hover {
      opacity: 0.8;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      #dialog-and-button-container {
        width: 98%; 
        align-items: center; 
      }
      
      #logbox {
        padding: 15px 10px;
        max-width: 100%; 
        min-height: 70px; 
      }
      
      .buttons-container {
        margin-left: 5px;
      }

      .image-btn {
        transform: translateY(0); 
      }
    }
  </style>
</head>
<body>
  <div class="scene-container">
    <div class="frame" id="sceneFrame">
      <img id="background" class="background" alt="Background" src="back/14.jpg" />
      <img id="character" class="character" alt="Character" />
    </div>
  </div>
  
  <div id="dialog-and-button-container">
    <div id="logbox">
      <div class="dialog-text" id="dialogText"></div>
    </div>
    <div class="buttons-container">
      <img src="TOS-Badge.webp" alt="Next" class="image-btn" id="nextBtn" />
    </div>
  </div>

<script>
  const backgroundImg = document.getElementById('background');
  const characterImg = document.getElementById('character');
  const dialogText = document.getElementById('dialogText');
  const nextBtn = document.getElementById('nextBtn');

  const dialogSequence = [
    { speaker: "Mudd", image: "MW-227.webp", visible: 0, text: "Blast that tin-plated pot.", background: "back/briefing5.jpg" },
    { speaker: "Computer", image: "back/nothing.gif", visible: 1, text: "Full data coming on screen.", background: "back/muddscreen.jpg" },
    { speaker: "Computer", image: "back/nothing.gif", visible: 1, text: "Offense record. Smuggling. Sentence suspended. Transport of stolen goods.", background: "back/muddscreen.jpg" },
    { speaker: "Women", image: "MW-233.webp", visible: 0, text: ".", background: "back/briefing7.jpg" },
    { speaker: "Computer", image: "back/nothing.gif", visible: 1, text: "Purchase of space vessel with counterfeit currency. Sentences, psychiatric treatment, effectiveness disputed.", background: "back/muddscreen.jpg" },
    { speaker: "Spock", image: "MW-291.webp", visible: 0, text: ".", background: "back/briefing4.jpg" },
    { speaker: "Kirk", image: "MW-213.webp", visible: 0, text: "Mister Mudd, you're charged with galaxy travel without a flight plan, without an identification beam", background: "back/briefing8.jpg" },
    { speaker: "Kirk", image: "MW-294.webp", visible: 0, text: "and failure to answer a starship's signal, thus effecting a menace to navigation.", background: "back/briefing2.jpg" },
    { speaker: "Mudd", image: "MW-237.webp", visible: 0, text: "What? My tiny ship in this immense galaxy a menace to navigation?", background: "back/briefing5.jpg" },
    { speaker: "Kirk", image: "MW-269.webp", visible: 0, text: "You're also charged with operation of a vessel without a master's license.", background: "back/briefing8.jpg" },
    { speaker: "Mudd", image: "MW-252.webp", visible: 0, text: "Untrue! I have a master's ticket.", background: "back/briefing5.jpg" },
    { speaker: "Computer", image: "back/nothing.gif", visible: 1, text: "Incorrect. Master's license revoked Stardate 1116.4.", background: "back/muddscreen.jpg" },
    { speaker: "Mudd", image: "MW-240.webp", visible: 0, text: "All right. Well, very simply, Leo Walsh, who was to be my captain on this trip, passed away suddenly. Well, I had no choice but to take out me ship me own self", background: "back/briefing5.jpg" },
    { speaker: "Mudd", image: "MW-237.webp", visible: 0, text: "I assumed Leo's name out of courtesy to him. In memoriam, as it were. A fine, fine man, alas, gone to his reward.", background: "back/briefing5.jpg" },
    { speaker: "Kirk", image: "MW-244.webp", visible: 0, text: "Destination and purpose of journey?", background: "back/briefing6.jpg" },
    { speaker: "Mudd", image: "MW-252.webp", visible: 0, text: "Planet Ophiuchus 3. Wiving settlers.", background: "back/briefing5.jpg" },
    { speaker: "Kirk", image: "MW-287.webp", visible: 0, text: "Come again, Mister Mudd. You do what?", background: "back/briefing6.jpg" },
    { speaker: "Mudd", image: "MW-252.webp", visible: 0, text: "I recruit wives for settlers, a difficult but satisfying task.", background: "back/briefing5.jpg" },
    { speaker: "Kirk", image: "MW-222.webp", visible: 0, text: "Data on witnesses.", background: "back/briefing6.jpg" },
    { speaker: "Computer", image: "back/nothing.gif", visible: 1, text: "No data.", background: "back/muddscreen2.jpg" },
    { speaker: "Mudd", image: "MW-284.webp", visible: 0, text: "You see, gentlemen, just as I told you. Three lovely ladies destined for frontier planets to be the companions of lonely men,", background: "back/briefing5.jpg" },
    { speaker: "Mudd", image: "MW-284.webp", visible: 0, text: "to supply that warmth of a human touch that's so desperately needed. A wife, a home, a family." },
    { speaker: "Mudd", image: "MW-221.webp", visible: 0, text: "Gentlemen, I look upon this work as a sacred public trust. I've devoted me whole life to it.", background: "back/briefing9.jpg" },
    { speaker: "Computer", image: "back/nothing.gif", visible: 1, text: "Incorrect.", background: "back/muddscreen2.jpg" },
    { speaker: "Spock", image: "MW-257.webp", visible: 0, text: ".", background: "back/briefing4.jpg" },
    { speaker: "Mudd", image: "MW-284.webp", visible: 0, text: "Well, I'm about to start devoting my entire life to it.", background: "back/briefing5.jpg" },
    { speaker: "Kirk", image: "MW-236.webp", visible: 0, text: "Did these ladies come voluntarily?", background: "back/briefing6.jpg" },
    { speaker: "Mudd", image: "MW-252.webp", visible: 0, text: "Well, of course! Now, for example, Ruthie here comes from a pelagic planet, sea ranchers. Magda there from the helium experimental station.", background: "back/briefing5.jpg" },
    { speaker: "Eve", image: "MW-245.webp", visible: 0, text: "It's the same story for all of us, Captain. No men. Mine was a farm planet with automated machines for company and two brothers to cook for, mend their clothes, canal mud a foot thick on their boots every time they walked in.", background: "back/briefing5.jpg" },
    { speaker: "McCoy", image: "MW-247.webp", visible: 0, text: ".", background: "back/briefing6.jpg" },
    { speaker: "Ruth", image: "MW-248.webp", visible: 0, text: ".", background: "back/briefing7.jpg" },
    { speaker: "McCoy", image: "MW-280.webp", visible: 0, text: ".", background: "back/briefing6.jpg" },
    { speaker: "Ruth", image: "MW-256.webp", visible: 0, text: ".", background: "back/briefing7.jpg" },
    { speaker: "Scotty", image: "MW-266.webp", visible: 0, text: ".", background: "back/briefing6.jpg" },
    { speaker: "Mudd", image: "MW-197.webp", visible: 0, text: "Fine, Evie. Fine.", background: "back/briefing5.jpg" },
    { speaker: "Eve", image: "MW-245.webp", visible: 0, text: "It's not fine! We've got men willing to be our husbands waiting for us, and you're taking us in the opposite direction! Staring at us Iike we were Saturnius harem girls or something.", background: "back/briefing5.jpg" },
    { speaker: "Mudd", image: "MW-252.webp", visible: 0, text: "That's enough, Evie.", background: "back/briefing5.jpg" },
    { speaker: "Kirk", image: "MW-236.webp", visible: 0, text: "The only charges are against Mister Mudd. Illegal operation of a vessel. Do you have any defense to offer?", background: "back/briefing6.jpg" },
    { speaker: "Mudd", image: "MW-240.webp", visible: 0, text: "Only heaven's own truth, which I've just given you.", background: "back/briefing5.jpg" },
    { speaker: "Kirk", image: "MW-236.webp", visible: 0, text: "The hearing is closed. Mister Mudd to be handed over to the legal authorities at our earliest opportunity.", background: "back/briefing6.jpg" },
    { speaker: "Eve", image: "MW-302.webp", visible: 0, text: "And what about us? What happens to us? Help us, please. All of us.", background: "back/briefing10.jpg" },
    { speaker: "Kirk", image: "MW-299.webp", visible: 0, text: "Miss McHuron, if you don't mind" },
  ];

  let currentIndex = 0;

  // Prevent image dragging
  document.querySelectorAll('.frame img').forEach(img => {
    img.addEventListener('dragstart', e => e.preventDefault());
  });

  function showDialog(index) {
    if (index >= dialogSequence.length) {
      location.href = 'MW-11.html';
      return;
    }

    const d = dialogSequence[index];

    // Update background
    if (d.background) {
      backgroundImg.src = d.background;
    }

    // Fade out character
    characterImg.style.opacity = '0';

    // Update character image and fade in
    setTimeout(() => {
      characterImg.src = d.image;
      dialogText.innerHTML = `<strong>${d.speaker}</strong><br>${d.text}`;
      
      // Only fade in if not the "nothing" image
      if (!d.image.includes('nothing.webp')) {
        setTimeout(() => {
          characterImg.style.opacity = '1';
        }, 150);
      }
    }, 300);
  }

  nextBtn.addEventListener('click', () => {
    currentIndex++;
    showDialog(currentIndex);
  });

  // Start
  showDialog(0);
</script>

</body>
</html>
