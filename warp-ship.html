<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Captain's Log Intro</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      color: white;
    }

    #starfield {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('back/warptrails.gif');
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
    }

#ship {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1); /* Start at normal size */
  width: auto;
  height: auto;
  max-width: 20%;
  max-height: 20%;
  z-index: 2;
  animation: zoomToPoint 23s forwards; /* 6 seconds, holds final state */
}

@keyframes zoomToPoint {
  from {
    transform: translate(-50%, -50%) scale(2);
  }
  to {
    transform: translate(-50%, -50%) scale(0.01); /* Zooms to tiny point */
  }
}

    #logbox {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
      font-size: 18px;
      line-height: 1.4em;
      border-top: 1px solid #444;
    }

    #continue-button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      background: #0ff;
      color: #000;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #continue-button:hover {
      background: #0cc;
    }
  </style>
</head>
<body>
  <div id="starfield"></div>
  <img id="ship" src="ships/enterprise-2.png" alt="Starship" />

  <div id="logbox">
    <div>
    </div>
  <script>
    setTimeout(function() {
      window.location.href = "STM13.html"; // Replace with the name of your next HTML file
    }, 5000); // 5000 milliseconds = 5 seconds
  </script>
  </div>
</body>
</html>
