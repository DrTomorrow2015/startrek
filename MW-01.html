<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>01</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      color: white;
      background: #000;
    }

    /* Main container centers everything */
    .scene-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* The frame maintains 900:450 aspect ratio and scales to fit screen */
    .frame {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: calc(100vw * 450 / 900); /* Maintain aspect ratio based on width */
      overflow: hidden;
      background: #000;
    }

    /* Alternative constraint: if height is limiting factor */
    @media (min-aspect-ratio: 900/450) {
      .frame {
        max-width: calc(100vh * 900 / 450);
        max-height: 100vh;
      }
    }

    /* All images fill the frame and scale together */
    .frame img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    /* Layer ordering */
    .background {
      z-index: 1;
    }
    
    .character {
      bottom: 200px;
      z-index: 2;
      object-fit: contain; /* Keep character proportions */
    }

    /* New container to group dialog box and button, and center them both */
    #dialog-and-button-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      /* Centers the combined width */
      transform: translateX(-50%); 
      display: flex;
      /* Align to the bottom of the logbox (fixes vertical position) */
      align-items: flex-end; 
      max-width: 1800px; /* INCREASED: Very wide limit for large screens */
      width: 95%; /* Use 95% to ensure spacing on wide screens */
      z-index: 10;
    }

    /* Dialog box - will now grow to fill space */
    #logbox {
      position: static; 
      transform: none; 
      width: auto; 
      max-width: none; /* NEW: Removed fixed width constraint for maximum expansion */
      padding: 15px 10px; 
      border-radius: 15px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      backdrop-filter: blur(10px);
      border: 2px solid #666;
      box-sizing: border-box;
      z-index: 10;
      flex-grow: 1; /* This makes it take all space available after button space is used */
      min-height: 90px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }

    .dialog-text {
      max-width: 100%; 
      margin: 0 auto;
      font-size: clamp(14px, 2vw, 18px); 
      line-height: 1.4em;
      text-align: center;
      margin-bottom: 0; 
      white-space: pre-wrap; 
      padding: 10px 0; 
    }

    /* Buttons container - OUTSIDE logbox, aligned right next to it */
    .buttons-container {
      margin-top: 0; 
      text-align: left; 
      padding-right: 0;
      margin-left: 10px; /* Space between dialog and button */
      margin-bottom: 0;
      flex-shrink: 0; 
    }

    .image-btn {
      cursor: pointer;
      width: clamp(50px, 7vw, 70px); 
      height: clamp(64px, 9vw, 90px);
      border: none;
      background: transparent;
      padding: 0;
      /* Adjusted to align button visually with the text box */
      transform: translateY(-5px); 
    }

    .image-btn:hover {
      opacity: 0.8;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      #dialog-and-button-container {
        width: 98%; 
        align-items: center; 
      }
      
      #logbox {
        padding: 15px 10px;
        max-width: 100%; 
        min-height: 70px; 
      }
      
      .buttons-container {
        margin-left: 5px;
      }

      .image-btn {
        transform: translateY(0); 
      }
    }
  </style>
</head>
<body>
  <div class="scene-container">
    <div class="frame" id="sceneFrame">
      <img id="background" class="background" alt="Background" src="back/14.jpg" />
      <img id="character" class="character" alt="Character" />
    </div>
  </div>
  
  <div id="dialog-and-button-container">
    <div id="logbox">
      <div class="dialog-text" id="dialogText"></div>
    </div>
    <div class="buttons-container">
      <img src="TOS-Badge.webp" alt="Next" class="image-btn" id="nextBtn" />
    </div>
  </div>

<script>
  const backgroundImg = document.getElementById('background');
  const characterImg = document.getElementById('character');
  const dialogText = document.getElementById('dialogText');
  const nextBtn = document.getElementById('nextBtn');

  const dialogSequence = [
    { speaker: "Kirk", image: "MW-037.webp", visible: 0, text: "Earth ship, Mister Spock?", background: "back/14.jpg" },
    { speaker: "Spock", image: "back/nothing.webp", visible: 0, text: "Difficult to say, Captain.", background: "back/screen2.jpg" },
    { speaker: "Spock", image: "MW-010.webp", visible: 0, text: "We're getting no registration beam from it.", background: "back/03.jpg" },
    { speaker: "Kirk", image: "MW-025.webp", visible: 0, text: ".", background: "back/05.jpg" },
    { speaker: "Scott", image: "MW-026.webp", visible: 0, text: "If it is, he'll soon overload his engines.", background: "back/00.jpg" },
    { speaker: "Sulu", image: "MW-005.webp", visible: 0, text: "Sir, he's pushing his engines too hard. Changing course again. ", background: "back/04.jpg" },
    { speaker: "Sulu", image: "MW-005.webp", visible: 0, text: "He knows we're after him all right." },
    { speaker: "Kirk", image: "MW-007.webp", visible: 0, text: "Stay with him, Mister Sulu. Communication?", background: "back/14.jpg" },
    { speaker: "Uhura", image: "MW-014.webp", visible: 0, text: "I've tried all frequencies, sir. He refuses to answer. Unless he's not receiving us.", background: "back/02.jpg" },
    { speaker: "Kirk", image: "MW-007.webp", visible: 0, text: "He's receiving us alright.", background: "back/14.jpg" },
    { speaker: "Spock", image: "MW-020.webp", visible: 0, text: "Approaching an asteroid belt, Captain. Schiller rating three five.", background: "back/03.jpg" },
    { speaker: "Sulu", image: "MW-012.webp", visible: 0, text: "There he is, sir. Centre screen. Still trying to run away from us, sir.", background: "back/19.jpg" },
    { speaker: "Kirk", image: "MW-016.webp", visible: 0, text: "Don't lose him, Mister Sulu.", background: "back/14.jpg" },
    { speaker: "Sulu", image: "MW-015.webp", visible: 0, text: "No, sir.", background: "back/19.jpg" },
    { speaker: "Kirk", image: "MW-038.webp", visible: 0, text: "Deflectors on, Mister Farrell.", background: "back/09.jpg" },
    { speaker: "Sulu", image: "MW-024.webp", visible: 0, text: "He's seen the asteroids too, sir.", background: "back/19.jpg" },
    { speaker: "Kirk", image: "MW-016.webp", visible: 0, text: "Stay with him. He'll try to lose us in them.", background: "back/14.jpg" },
    { speaker: "Sulu", image: "MW-005.webp", visible: 0, text: "If one hits him.", background: "back/04.jpg" },
    { speaker: "Spock", image: "MW-020.webp", visible: 0, text: "Sensor reading on the vessel. I make it out as a small class J cargo ship, and his engines are super-heating.", background: "back/03.jpg" },
    { speaker: "Kirk", image: "MW-031.webp", visible: 0, text: "Try to warn him. If he loses power now", background: "back/21.jpg" },
    { speaker: "Farrell", image: "back/nothing.webp", visible: 0, text: "There go his engines, sir.", background: "back/screen2.jpg" },
    { speaker: "Sulu", image: "MW-028.webp", visible: 0, text: "He's drifting into the asteroid belt, Captain.", background: "back/19.jpg" },
    { speaker: "Farrell", image: "MW-012.webp", visible: 0, text: "He's had it, unless we put our deflector screen around him." },
    { speaker: "Scott", image: "MW-026.webp", visible: 0, text: "Captain, if we try, we'll overload our own engines. He's too far away.", background: "back/00.jpg" },
    { speaker: "Kirk", image: "MW-031.webp", visible: 0, text: "Cover him with our deflector screen, Mister Farrell. Scotty, Spock, stand by in the transporter room.", background: "back/21.jpg" },
    { speaker: "Scott", image: "MW-026.webp", visible: 0, text: "Aye, sir.", background: "back/00.jpg" },
    { speaker: "Farrell", image: "MW-038.webp", visible: 0, text: "We're protecting him, sir. We won't be able to hold it long.", background: "back/00.jpg" },
  ];

  let currentIndex = 0;

  // Prevent image dragging
  document.querySelectorAll('.frame img').forEach(img => {
    img.addEventListener('dragstart', e => e.preventDefault());
  });

  function showDialog(index) {
    if (index >= dialogSequence.length) {
      location.href = 'MW-alert.html';
      return;
    }

    const d = dialogSequence[index];

    // Update background
    if (d.background) {
      backgroundImg.src = d.background;
    }

    // Fade out character
    characterImg.style.opacity = '0';

    // Update character image and fade in
    setTimeout(() => {
      characterImg.src = d.image;
      dialogText.innerHTML = `<strong>${d.speaker}</strong><br>${d.text}`;
      
      // Only fade in if not the "nothing" image
      if (!d.image.includes('nothing.webp')) {
        setTimeout(() => {
          characterImg.style.opacity = '1';
        }, 150);
      }
    }, 300);
  }

  nextBtn.addEventListener('click', () => {
    currentIndex++;
    showDialog(currentIndex);
  });

  // Start
  showDialog(0);
</script>

</body>
</html>
