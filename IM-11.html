<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IM Combined</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: sans-serif;
      color: white;
      background: #000;
    }

    .scene-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .frame {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: calc(100vw * 450 / 900);
      overflow: hidden;
      background: #000;
    }

    @media (min-aspect-ratio: 900/450) {
      .frame {
        max-width: calc(100vh * 900 / 450);
        max-height: 100vh;
      }
    }

    .frame img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .background {
      z-index: 1;
    }

    .character {
      bottom: 200px;
      z-index: 2;
      object-fit: contain;
    }

    #dialog-and-button-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: flex-end;
      max-width: 1800px;
      width: 95%;
      z-index: 10;
    }

    #logbox {
      position: static;
      transform: none;
      width: auto;
      max-width: none;
      padding: 15px 10px;
      border-radius: 15px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      backdrop-filter: blur(10px);
      border: 2px solid #666;
      box-sizing: border-box;
      z-index: 10;
      flex-grow: 1;
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dialog-text {
      max-width: 100%;
      margin: 0 auto;
      font-size: clamp(14px, 2vw, 18px);
      line-height: 1.4em;
      text-align: center;
      margin-bottom: 0;
      white-space: pre-wrap;
      padding: 10px 0;
    }

    .buttons-container {
      margin-top: 0;
      text-align: left;
      padding-right: 0;
      margin-left: 10px;
      margin-bottom: 0;
      flex-shrink: 0;
    }

    .image-btn {
      cursor: pointer;
      width: clamp(50px, 7vw, 70px);
      height: clamp(64px, 9vw, 90px);
      border: none;
      background: transparent;
      padding: 0;
      transform: translateY(-5px);
    }

    .image-btn:hover {
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      #dialog-and-button-container {
        width: 98%;
        align-items: center;
      }

      #logbox {
        padding: 15px 10px;
        max-width: 100%;
        min-height: 70px;
      }

      .buttons-container {
        margin-left: 5px;
      }

      .image-btn {
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="scene-container">
    <div class="frame" id="sceneFrame">
      <img id="background" class="background" alt="Background" src="back/14.jpg" />
      <img id="character" class="character" alt="Character" />
    </div>
  </div>

  <div id="dialog-and-button-container">
    <div id="logbox">
      <div class="dialog-text" id="dialogText"></div>
    </div>
    <div class="buttons-container">
      <img src="TOS-Badge.webp" alt="Next" class="image-btn" id="nextBtn" />
    </div>
  </div>

<script>

  const dialogSequence = [
    // --- IM-11 ---
    { speaker: "Alice 471", image: "i-m-374.webp", visible: 0, text: "I am not programmed", background: "back/galor8.jpg" },

    { speaker: "Kirk", image: "i-m-375.webp", visible: 0, text: "Alice, give us back our ship to please us. Return us to our ship because we desire it." },
    { speaker: "Alice 471", image: "i-m-381.webp", visible: 0, text: "We are programmed to serve. We shall serve you to your best interests to make you happy." },

    { speaker: "Alice 471", image: "i-m-378.webp", visible: 0, text: "Please explain unhappy.", background: "back/galor8.jpg" },
    { speaker: "Spock", image: "i-m-376.webp", visible: 0, text: "Unhappiness is the state which occurs in the human when wants and desires are not fulfilled." },

    // --- IM-11b ---
    { speaker: "Kirk", image: "i-m-384.webp", visible: 0, text: "Interesting.", background: "back/galor8c.jpg" },
    { speaker: "Spock", image: "i-m-385.webp", visible: 0, text: "Fascinating.", background: "back/galor8b.jpg" },
    { speaker: "Kirk", image: "i-m-388.webp", visible: 0, text: "Bones, have you had time to take any psychological readings of the androids?", background: "back/galor8.jpg" },

    { speaker: "McCoy", image: "i-m-392.webp", visible: 0, text: "No vices, no fears, no faults. Just a sense of purpose. Believe me, there's nothing tougher to overcome, even among humans.", background: "back/galor13.jpg" },
    { speaker: "Kirk", image: "i-m-387.webp", visible: 0, text: "Yes. That's what this crew needs, a little sense of purpose.", background: "back/galor8c.jpg" },
    { speaker: "Kirk", image: "i-m-396.webp", visible: 0, text: "Mudd, a few questions I want to ask you.", background: "back/galor1.jpg" },
    { speaker: "Mudd", image: "i-m-398.webp", visible: 0, text: "Afraid I won't have time to answer them. My bags are all packed. The androids will take the Enterprise out of orbit in less than twenty four hours." },
    { speaker: "Mudd", image: "i-m-398.webp", visible: 0, text: "But it's been a real pleasure having you here, Kirk. Is there anything I can get for you?" },
    { speaker: "Kirk", image: "i-m-438.webp", visible: 0, text: "Yes. My ship.", background: "back/galor12b.jpg" },
    { speaker: "Mudd", image: "i-m-399.webp", visible: 0, text: "You're a stubborn fellow, aren't you? But I don't mind. I don't mind that at all.", background: "back/galor1.jpg" },

    { speaker: "Mudd", image: "i-m-401.webp", visible: 0, text: " One last time. Stella, dear.", background: "back/galor5.jpg" },

    { speaker: "Mudd", image: "i-m-408.webp", visible: 0, text: "Alice Number 2, my little love. Will you have my bags transported up to the ship?" },
    { speaker: "Androids", image: "i-m-411.webp", visible: 0, text: "No, my Lord Mudd.", background: "back/galor12.jpg" },
    { speaker: "Mudd", image: "i-m-411.webp", visible: 0, text: "What?" },
    { speaker: "Norman", image: "i-m-427.webp", visible: 0, text: "We can no longer take your orders, Harry Mudd.", background: "back/galor12b.jpg" },

    { speaker: "Norman", image: "i-m-434.webp", visible: 0, text: "but used his knowledge to obtain more specimens. Your species is self-destructive. You need our help." },
    { speaker: "Kirk", image: "i-m-273.webp", visible: 0, text: "We prefer to help ourselves. We make mistakes, but we're human. And maybe that's the word that best explains us." },
    { speaker: "Norman", image: "i-m-427.webp", visible: 0, text: "We will not harm you, but we will take the starship, and you will remain on this planet." },
    { speaker: "Mudd", image: "i-m-414.webp", visible: 0, text: "Now, look here. You can't do that! Now, listen. To serve us, you must obey us.", background: "back/galor12.jpg" },

    { speaker: "Kirk", image: "i-m-447.webp", visible: 0, text: "The whole galaxy controlled by your kind?" },
    { speaker: "Norman", image: "i-m-434.webp", visible: 0, text: "Yes, Captain. And we shall serve them and you will be happy, and controlled." },
    { speaker: "Kirk", image: "i-m-438.webp", visible: 0, text: "So far this thing has had its amusing aspects, but that threat the androids made about taking over all the humans in the galaxy is not very funny.", background: "back/galor13.jpg" },
    { speaker: "Spock", image: "i-m-437.webp", visible: 0, text: "Indeed, it is not. They may quite possibly be able to accomplish it." },

    { speaker: "McCoy", image: "i-m-440.webp", visible: 1, text: "How do you know so much?" },

    { speaker: "Mudd", image: "i-m-444.webp", visible: 0, text: "You're so smart, Kirk, you and this pointy-eared thinking machine of yours.", background: "back/galor8b.jpg" },

  let currentIndex = 0;

  document.querySelectorAll('.frame img').forEach(img => {
    img.addEventListener('dragstart', e => e.preventDefault());
  });

  function showDialog(index) {
    if (index >= dialogSequence.length) {
      location.href = 'main-hub.html';
      return;
    }

    const d = dialogSequence[index];

    if (d.background) {
      backgroundImg.src = d.background;
    }

    characterImg.style.opacity = '0';

    setTimeout(() => {
      characterImg.src = d.image;
      dialogText.innerHTML = `<strong>${d.speaker}</strong><br>${d.text}`;

      if (!d.image.includes('nothing.webp')) {
        setTimeout(() => {
          characterImg.style.opacity = '1';
        }, 150);
      }
    }, 300);
  }

  nextBtn.addEventListener('click', () => {
    currentIndex++;
    showDialog(currentIndex);
  });

  showDialog(0);
